version: "3.9"

services:
  dairy-milk-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dairy-milk-site
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
